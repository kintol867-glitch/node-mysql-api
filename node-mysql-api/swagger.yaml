openapi: 3.0.0
info:
  title: Node MySQL API
  version: 1.0.0
servers:
  - url: https://node-mysql-api-ftxq.onrender.com
    description: Production server
  - url: http://localhost:4000
    description: Local development
paths:
  /accounts/register:
    post:
      summary: Register a new account
      tags: [Accounts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
                password:
                  type: string
                confirmPassword:
                  type: string
                acceptTerms:
                  type: boolean
      responses:
        '200':
          description: Registration successful
  /accounts/verify-email:
    post:
      summary: Verify email address
      tags: [Accounts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
      responses:
        '200':
          description: Verification successful
  /accounts/authenticate:
    post:
      summary: Login with email and password
      tags: [Accounts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
  /accounts/refresh-token:
    post:
      summary: Refresh JWT token
      tags: [Accounts]
      responses:
        '200':
          description: Token refreshed
  /accounts/revoke-token:
    post:
      summary: Revoke refresh token
      tags: [Accounts]
      responses:
        '200':
          description: Token revoked
  /accounts/forgot-password:
    post:
      summary: Submit email for password reset
      tags: [Accounts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
      responses:
        '200':
          description: Reset email sent
  /accounts/reset-password:
    post:
      summary: Reset password with token
      tags: [Accounts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                password:
                  type: string
                confirmPassword:
                  type: string
      responses:
        '200':
          description: Password reset successful
  /accounts:
    get:
      summary: Get all accounts (Admin only)
      tags: [Accounts]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of accounts
  /accounts/{id}:
    get:
      summary: Get account by ID
      tags: [Accounts]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Account details
    put:
      summary: Update account
      tags: [Accounts]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Account updated
    delete:
      summary: Delete account
      tags: [Accounts]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Account deleted
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT